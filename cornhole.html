<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cornhole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #1a1f2e;
    --surface:  #242a3a;
    --card:     #2d3447;
    --gold:     #f0c040;
    --gold-dim: #a07c1a;
    --green:    #4caf7d;
    --red:      #e05555;
    --text:     #e8e4d8;
    --muted:    #7a8099;
    --radius:   20px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 8px;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.5px;
  }

  .logo span { font-style: italic; font-weight: 300; color: var(--text); }

  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border-radius: 30px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.07);
    user-select: none;
  }

  .mode-toggle .pill {
    background: var(--gold);
    color: var(--bg);
    border-radius: 20px;
    padding: 2px 8px;
    font-weight: 600;
    font-size: 11px;
    transition: background 0.2s;
  }

  /* ── Scoreboards ── */
  .boards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }

  .board {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 12px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    border: 1.5px solid rgba(255,255,255,0.06);
    position: relative;
    transition: border-color 0.3s;
  }

  .board.winning { border-color: var(--gold); }
  .board.busted  { border-color: var(--red); }

  .team-name-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 100%;
    justify-content: center;
  }

  .team-name {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    background: transparent;
    border: none;
    outline: none;
    color: var(--muted);
    width: 100%;
    text-align: center;
    cursor: pointer;
  }

  .team-name:focus { color: var(--text); }

  .score-display {
    font-family: 'Fraunces', serif;
    font-size: 68px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), color 0.3s;
  }

  .score-display.bump { transform: scale(1.15); }
  .board.winning .score-display { color: var(--gold); }
  .board.busted  .score-display { color: var(--red); }

  .score-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ── Round input ── */
  .round-section {
    margin-top: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .round-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .round-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .round-number {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    color: var(--gold);
    font-weight: 700;
  }

  .inputs-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
  }

  .team-input-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .input-team-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .point-input-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    width: 100%;
  }

  .pt-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 22px;
    font-weight: 300;
    width: 40px;
    height: 52px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .pt-btn:active { background: rgba(255,255,255,0.1); }

  .pt-val {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    text-align: center;
    min-width: 0;
  }

  .vs-badge {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 300;
    color: var(--muted);
    text-align: center;
  }

  .add-btn {
    margin-top: 14px;
    width: 100%;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .add-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ── History ── */
  .history-section {
    margin-top: 14px;
    flex: 1;
  }

  .history-header {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
  }

  .history-item {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .h-round { color: var(--muted); font-size: 11px; font-weight: 600; }
  .h-pts   { font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; text-align: center; }
  .h-pts.positive { color: var(--green); }
  .h-pts.zero     { color: var(--muted); }
  .h-sep   { color: var(--muted); text-align: center; font-size: 11px; }

  /* ── Winner overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    padding: 32px;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show { opacity: 1; pointer-events: all; }

  .winner-badge {
    font-size: 64px;
    line-height: 1;
  }

  .winner-title {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
  }

  .winner-sub {
    font-size: 15px;
    color: var(--muted);
    text-align: center;
  }

  .new-game-btn {
    margin-top: 8px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  .busted-note {
    font-size: 12px;
    color: var(--red);
    text-align: center;
    margin-top: 2px;
    min-height: 16px;
  }

  .mode-info {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Corn<span>hole</span></div>
  <div class="mode-toggle" onclick="toggleMode()">
    Vindbetingelse: <span class="pill" id="modePill">Præcis 21</span>
  </div>
</header>

<!-- Score boards -->
<div class="boards">
  <div class="board" id="board0">
    <div class="team-name-wrap">
      <input class="team-name" id="name0" value="Hold 1" maxlength="10" onclick="this.select()">
    </div>
    <div class="score-display" id="score0">0</div>
    <div class="score-label">point</div>
    <div class="busted-note" id="bust0"></div>
  </div>
  <div class="board" id="board1">
    <div class="team-name-wrap">
      <input class="team-name" id="name1" value="Hold 2" maxlength="10" onclick="this.select()">
    </div>
    <div class="score-display" id="score1">0</div>
    <div class="score-label">point</div>
    <div class="busted-note" id="bust1"></div>
  </div>
</div>

<!-- Round input -->
<div class="round-section">
  <div class="round-header">
    <span class="round-label">Runde</span>
    <span class="round-number" id="roundNum">1</span>
  </div>
  <div class="inputs-row">
    <div class="team-input-block">
      <div class="input-team-label" id="inputLabel0">Hold 1</div>
      <div class="point-input-wrap">
        <button class="pt-btn" onclick="change(0,-1)">−</button>
        <div class="pt-val" id="input0">0</div>
        <button class="pt-btn" onclick="change(0,1)">+</button>
      </div>
    </div>
    <div class="vs-badge">vs</div>
    <div class="team-input-block">
      <div class="input-team-label" id="inputLabel1">Hold 2</div>
      <div class="point-input-wrap">
        <button class="pt-btn" onclick="change(1,-1)">−</button>
        <div class="pt-val" id="input1">0</div>
        <button class="pt-btn" onclick="change(1,1)">+</button>
      </div>
    </div>
  </div>
  <button class="add-btn" onclick="addRound()">Registrér runde ›</button>
  <div class="mode-info" id="modeInfo">Vinder ved præcis 21 — bust sender dig tilbage til 15</div>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-header">Rundehistorik</div>
  <div class="history-list" id="historyList">
    <div style="color:var(--muted);font-size:13px;padding:8px 4px;">Ingen runder endnu.</div>
  </div>
</div>

<!-- Winner overlay -->
<div class="overlay" id="overlay">
  <div class="winner-badge">🏆</div>
  <div class="winner-title" id="winnerTitle">Hold 1 vinder!</div>
  <div class="winner-sub" id="winnerSub">Tillykke!</div>
  <button class="new-game-btn" onclick="newGame()">Ny kamp</button>
</div>

<script>
  // State
  let scores = [0, 0];
  let roundInputs = [0, 0];
  let round = 1;
  let exactMode = true; // true = præcis 21, false = mindst 21
  let history = [];
  let gameOver = false;

  // Sync team labels in input area
  function syncLabels() {
    document.getElementById('inputLabel0').textContent = document.getElementById('name0').value || 'Hold 1';
    document.getElementById('inputLabel1').textContent = document.getElementById('name1').value || 'Hold 2';
  }
  document.getElementById('name0').addEventListener('input', syncLabels);
  document.getElementById('name1').addEventListener('input', syncLabels);

  function toggleMode() {
    exactMode = !exactMode;
    document.getElementById('modePill').textContent = exactMode ? 'Præcis 21' : 'Mindst 21';
    document.getElementById('modeInfo').textContent = exactMode
      ? 'Vinder ved præcis 21 — bust sender dig tilbage til 15'
      : 'Vinder ved 21 eller derover';
    renderBoards();
  }

  function change(team, delta) {
    if (gameOver) return;
    roundInputs[team] = Math.max(0, roundInputs[team] + delta);
    document.getElementById('input' + team).textContent = roundInputs[team];
  }

  function addRound() {
    if (gameOver) return;

    const p0 = roundInputs[0];
    const p1 = roundInputs[1];

    // Cancel scoring: only net points count
    let net0 = Math.max(0, p0 - p1);
    let net1 = Math.max(0, p1 - p0);

    history.push({ round, net0, net1, raw0: p0, raw1: p1 });

    // Apply scores
    scores[0] += net0;
    scores[1] += net1;

    // Bust check (exact mode)
    if (exactMode) {
      if (scores[0] > 21) { scores[0] = 15; }
      if (scores[1] > 21) { scores[1] = 15; }
    }

    round++;
    roundInputs = [0, 0];
    document.getElementById('input0').textContent = '0';
    document.getElementById('input1').textContent = '0';

    renderBoards();
    renderHistory();
    checkWin();
  }

  function renderBoards() {
    for (let i = 0; i < 2; i++) {
      const s = scores[i];
      const el = document.getElementById('score' + i);
      const board = document.getElementById('board' + i);
      const bust = document.getElementById('bust' + i);

      el.textContent = s;
      board.classList.remove('winning', 'busted');
      bust.textContent = '';

      if (exactMode && s > 21) {
        // handled already but show visually if needed
      } else if (!exactMode && s >= 21) {
        board.classList.add('winning');
      } else if (exactMode && s === 21) {
        board.classList.add('winning');
      }

      // bump animation
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 200);
    }
    document.getElementById('roundNum').textContent = round;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if (history.length === 0) {
      list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 4px;">Ingen runder endnu.</div>';
      return;
    }
    // Show newest first
    [...history].reverse().forEach(h => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <span class="h-round">R${h.round}</span>
        <span class="h-pts ${h.net0 > 0 ? 'positive' : 'zero'}">+${h.net0}</span>
        <span class="h-sep">—</span>
        <span class="h-pts ${h.net1 > 0 ? 'positive' : 'zero'}">+${h.net1}</span>
      `;
      list.appendChild(item);
    });
  }

  function checkWin() {
    let winner = -1;
    if (exactMode) {
      if (scores[0] === 21) winner = 0;
      else if (scores[1] === 21) winner = 1;
    } else {
      if (scores[0] >= 21 && scores[1] >= 21) {
        winner = scores[0] >= scores[1] ? 0 : 1;
      } else if (scores[0] >= 21) winner = 0;
      else if (scores[1] >= 21) winner = 1;
    }

    if (winner >= 0) {
      gameOver = true;
      const name = document.getElementById('name' + winner).value || ('Hold ' + (winner+1));
      document.getElementById('winnerTitle').textContent = name + ' vinder!';
      document.getElementById('winnerSub').textContent = `${scores[winner]} point efter ${round-1} runder`;
      document.getElementById('overlay').classList.add('show');
    }
  }

  function newGame() {
    scores = [0, 0];
    roundInputs = [0, 0];
    round = 1;
    history = [];
    gameOver = false;
    document.getElementById('input0').textContent = '0';
    document.getElementById('input1').textContent = '0';
    document.getElementById('score0').textContent = '0';
    document.getElementById('score1').textContent = '0';
    document.getElementById('board0').classList.remove('winning','busted');
    document.getElementById('board1').classList.remove('winning','busted');
    document.getElementById('bust0').textContent = '';
    document.getElementById('bust1').textContent = '';
    document.getElementById('roundNum').textContent = '1';
    document.getElementById('overlay').classList.remove('show');
    renderHistory();
  }
</script>
</body>
</html>
